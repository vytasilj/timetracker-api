services:
  postgres:
    image: postgres:17
    container_name: timetracker-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - timetracker-db-data:/var/lib/postgresql/data

volumes:
  timetracker-db-data: